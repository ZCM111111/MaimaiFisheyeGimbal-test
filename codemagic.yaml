workflows:
  debug-build:
    name: Debug Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      vars:
        XCODE_PROJECT: MaimaiFisheyeGimbal.xcodeproj
        XCODE_SCHEME: MaimaiFisheyeGimbal
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
        - pattern: main
          include: true
    scripts:
      - name: Install tools
        script: |
          echo "===== 安装 XcodeGen + Metal ====="
          brew install xcodegen
          xcodebuild -downloadComponent MetalToolchain 2>&1 | tail -1

      - name: Generate project
        script: |
          echo "===== 生成项目 ====="
          xcodegen generate

      - name: Build
        script: |
          echo "===== 编译 (Debug, 无签名) ====="
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet 2>&1 | grep -E "(error:|warning:|BUILD)" || true

      - name: Package unsigned IPA
        script: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "MaimaiFisheyeGimbal.app" -path "*/Debug-iphoneos/*" 2>/dev/null | head -1)

          if [ -z "$APP" ]; then
            echo "❌ 找不到 .app"
            exit 1
          fi

          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r MaimaiFisheyeGimbal-unsigned.ipa Payload
          rm -rf Payload

          echo ""
          echo "========================================="
          echo " ✅ 无签名 IPA 已生成"
          echo "========================================="
          echo "文件: $(pwd)/MaimaiFisheyeGimbal-unsigned.ipa"
          echo "大小: $(du -sh MaimaiFisheyeGimbal-unsigned.ipa | cut -f1)"

    artifacts:
      - MaimaiFisheyeGimbal-unsigned.ipa

  pr-check:
    name: PR Check
    instance_type: mac_mini_m1
    max_build_duration: 30
    triggering:
      events:
        - pull_request
    scripts:
      - name: Install tools
        script: |
          echo "===== 安装工具 ====="
          brew install xcodegen
          xcodebuild -downloadComponent MetalToolchain 2>&1 | tail -1
      - name: Generate + Build
        script: |
          echo "===== 生成项目 ====="
          xcodegen generate
          echo "===== 编译检查 ====="
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet 2>&1 | grep -E "(error:|warning:|BUILD)" || true
          echo ""
          echo "✅ BUILD PASSED"
