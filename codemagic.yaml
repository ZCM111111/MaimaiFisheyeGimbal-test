workflows:
  debug-build:
    name: Debug Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      vars:
        XCODE_PROJECT: MaimaiFisheyeGimbal.xcodeproj
        XCODE_SCHEME: MaimaiFisheyeGimbal
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
        - pattern: main
          include: true
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Install Metal Toolchain
        script: xcodebuild -downloadComponent MetalToolchain
      - name: Generate Xcode project
        script: xcodegen generate
      - name: Build (no signing)
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  pr-check:
    name: PR Check
    instance_type: mac_mini_m1
    max_build_duration: 30
    triggering:
      events:
        - pull_request
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Install Metal Toolchain
        script: xcodebuild -downloadComponent MetalToolchain
      - name: Generate Xcode project
        script: xcodegen generate
      - name: Build check (no signing)
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
