name: MaimaiFisheyeGimbal
options:
  bundleIdPrefix: com.maimai
  deploymentTarget:
    iOS: "17.0"
settings:
  SWIFT_VERSION: "5.9"
targets:
  MaimaiFisheyeGimbal:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - .git
          - .gitignore
          - codemagic.yaml
          - exportOptions.plist
          - README.md
          - project.yml
          - ".xcodeproj"
          - ".build"
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.maimai.fisheyegimbal
