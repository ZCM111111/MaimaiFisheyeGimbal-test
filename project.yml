name: MaimaiFisheyeGimbal
options:
  bundleIdPrefix: com.maimai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  SWIFT_VERSION: "5.9"
  METAL_ENABLE_DEBUG_INFO: "YES"
targets:
  MaimaiFisheyeGimbal:
    type: application
    platform: iOS
    sources:
      - path: MaimaiFisheyeGimbalApp.swift
      - path: ContentView.swift
      - path: Models
      - path: Services
      - path: Shaders
      - path: Views
      - path: LaunchScreen.storyboard
      - path: Info.plist
        buildPhase: none
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.maimai.fisheyegimbal
        DEVELOPMENT_TEAM: ""
