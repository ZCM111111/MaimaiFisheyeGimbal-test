workflows:
  debug-build:
    name: Debug Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      vars:
        XCODE_PROJECT: MaimaiFisheyeGimbal.xcodeproj
        XCODE_SCHEME: MaimaiFisheyeGimbal
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
        - pattern: main
          include: true
    scripts:
      - name: Install tools
        script: |
          echo "===== 安装 XcodeGen + Metal ====="
          brew install xcodegen
          xcodebuild -downloadComponent MetalToolchain 2>&1 | tail -1

      - name: Generate project
        script: |
          echo "===== 生成项目 ====="
          xcodegen generate
          echo "--- project.yml ---"
          cat project.yml
          echo "--- generated pbxproj (build phases) ---"
          grep -A5 "shellScript" MaimaiFisheyeGimbal.xcodeproj/project.pbxproj | head -30

      - name: Build
        script: |
          echo "===== 编译 (Debug, 无签名) ====="
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | grep -E "(error:|warning:|BUILD|✅|❌|Info\.plist|PhaseScriptExecution)" || true

      - name: Package unsigned IPA
        script: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "MaimaiFisheyeGimbal.app" -path "*/Debug-iphoneos/*" 2>/dev/null | head -1)

          if [ -z "$APP" ]; then
            echo "❌ 找不到 .app"
            exit 1
          fi

          # 如果 Xcode 没生成 Info.plist，手动拷进去
          if [ ! -f "$APP/Info.plist" ]; then
            echo "⚠️ Xcode 没生成 Info.plist，手动拷贝..."
            cp -v Info.plist "$APP/Info.plist"
          fi

          echo "--- .app 内容 ---"
          ls -la "$APP/"

          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -rq MaimaiFisheyeGimbal-unsigned.ipa Payload
          rm -rf Payload

          echo ""
          echo "✅ IPA: $(pwd)/MaimaiFisheyeGimbal-unsigned.ipa"
          echo "   大小: $(du -sh MaimaiFisheyeGimbal-unsigned.ipa | cut -f1)"

    artifacts:
      - MaimaiFisheyeGimbal-unsigned.ipa

  pr-check:
    name: PR Check
    instance_type: mac_mini_m1
    max_build_duration: 30
    triggering:
      events:
        - pull_request
    scripts:
      - name: Install tools
        script: |
          brew install xcodegen
          xcodebuild -downloadComponent MetalToolchain 2>&1 | tail -1
      - name: Generate + Build
        script: |
          xcodegen generate
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | grep -E "(error:|warning:|BUILD|✅|❌)" || true
          echo "✅ BUILD PASSED"
