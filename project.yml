name: MaimaiFisheyeGimbal
options:
  bundleIdPrefix: com.maimai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  SWIFT_VERSION: "5.9"
  METAL_ENABLE_DEBUG_INFO: "YES"
targets:
  MaimaiFisheyeGimbal:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - .git
          - .gitignore
          - codemagic.yaml
          - exportOptions.plist
          - README.md
          - project.yml
          - ".xcodeproj"
          - ".build"
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.maimai.fisheyegimbal
        DEVELOPMENT_TEAM: ""
    postBuildScripts:
      - name: "Force Copy Info.plist"
        script: |
          set -e
          SRC="${SOURCE_ROOT}/Info.plist"
          DST="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Info.plist"
          if [ -f "$SRC" ]; then
            cp "$SRC" "$DST"
            echo "✅ Info.plist manually copied to .app bundle"
          else
            echo "❌ Source Info.plist not found at $SRC"
            exit 1
          fi
