workflows:
  debug-build:
    name: Debug Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      vars:
        XCODE_PROJECT: MaimaiFisheyeGimbal.xcodeproj
        XCODE_SCHEME: MaimaiFisheyeGimbal
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
        - pattern: main
          include: true
    scripts:
      - name: Install tools
        script: |
          echo "===== 安装 XcodeGen + Metal ====="
          brew install xcodegen
          xcodebuild -downloadComponent MetalToolchain 2>&1 | tail -1

      - name: Generate project
        script: |
          echo "===== 生成项目 ====="
          xcodegen generate
          echo "--- project.yml ---"
          cat project.yml
          echo "--- generated pbxproj (build phases) ---"
          grep -A5 "shellScript" MaimaiFisheyeGimbal.xcodeproj/project.pbxproj | head -30

      - name: Build
        script: |
          echo "===== 编译 (Debug, 无签名) ====="
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | grep -E "(error:|warning:|BUILD|✅|❌|Info\.plist|PhaseScriptExecution)" || true

      - name: Package unsigned IPA
        script: |
          echo "===== 查找 .app ====="
          find ~/Library/Developer/Xcode/DerivedData -name "MaimaiFisheyeGimbal.app" -path "*/Debug-iphoneos/*" 2>/dev/null | while read app; do
            echo "Found: $app"
            echo "--- contents ---"
            ls -la "$app/"
          done

          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "MaimaiFisheyeGimbal.app" -path "*/Debug-iphoneos/*" 2>/dev/null | head -1)

          if [ -z "$APP" ]; then
            echo "❌ 找不到 .app"
            exit 1
          fi

          if [ ! -f "$APP/Info.plist" ]; then
            echo "❌ .app 中缺少 Info.plist!"
            echo "Contents of $APP:"
            ls -laR "$APP/" | head -50
            exit 1
          fi

          echo "✅ Info.plist 存在: $(ls -la "$APP/Info.plist")"

          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r MaimaiFisheyeGimbal-unsigned.ipa Payload
          rm -rf Payload

          echo ""
          echo "========================================="
          echo " ✅ 无签名 IPA 已生成"
          echo "========================================="
          echo "文件: $(pwd)/MaimaiFisheyeGimbal-unsigned.ipa"
          echo "大小: $(du -sh MaimaiFisheyeGimbal-unsigned.ipa | cut -f1)"

    artifacts:
      - MaimaiFisheyeGimbal-unsigned.ipa

  pr-check:
    name: PR Check
    instance_type: mac_mini_m1
    max_build_duration: 30
    triggering:
      events:
        - pull_request
    scripts:
      - name: Install tools
        script: |
          brew install xcodegen
          xcodebuild -downloadComponent MetalToolchain 2>&1 | tail -1
      - name: Generate + Build
        script: |
          xcodegen generate
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | grep -E "(error:|warning:|BUILD|✅|❌)" || true
          echo "✅ BUILD PASSED"
