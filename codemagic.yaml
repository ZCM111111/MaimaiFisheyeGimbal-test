workflows:
  debug-build:
    name: Debug Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      vars:
        XCODE_PROJECT: MaimaiFisheyeGimbal.xcodeproj
        XCODE_SCHEME: MaimaiFisheyeGimbal
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
        - pattern: main
          include: true
    scripts:
      - name: Install tools
        script: |
          brew install xcodegen
          xcodebuild -downloadComponent MetalToolchain 2>&1 | tail -1

      - name: Generate project
        script: |
          xcodegen generate

      - name: Build
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO 2>&1 | grep -E "(error:|warning:|BUILD|Ld |PhaseScript)" || true

      - name: Package unsigned IPA
        script: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "MaimaiFisheyeGimbal.app" -path "*/Debug-iphoneos/*" 2>/dev/null | head -1)

          echo "APP: $APP"
          ls -la "$APP/"
          file "$APP/MaimaiFisheyeGimbal" 2>/dev/null || echo "⚠️ 可执行文件不存在!"

          [ ! -f "$APP/Info.plist" ] && cp Info.plist "$APP/Info.plist"

          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -rq MaimaiFisheyeGimbal-unsigned.ipa Payload
          rm -rf Payload
          echo "✅ $(pwd)/MaimaiFisheyeGimbal-unsigned.ipa ($(du -sh MaimaiFisheyeGimbal-unsigned.ipa | cut -f1))"

    artifacts:
      - MaimaiFisheyeGimbal-unsigned.ipa

  pr-check:
    name: PR Check
    instance_type: mac_mini_m1
    max_build_duration: 30
    triggering:
      events:
        - pull_request
    scripts:
      - name: Install + Build
        script: |
          brew install xcodegen
          xcodebuild -downloadComponent MetalToolchain 2>&1 | tail -1
          xcodegen generate
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO 2>&1 | grep -E "(error:|warning:|BUILD)" || true
          echo "✅ BUILD PASSED"
